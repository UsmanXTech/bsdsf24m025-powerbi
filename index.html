<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar h1 {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .topbar span {
      font-size: 13px;
      color: #888;
    }

    .container {
      padding: 20px 24px;
    }

    .iframe-wrapper {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    /* ===== PASTE YOUR IFRAME HERE ===== */
    .iframe-wrapper iframe {
      width: 100%;
      height: 600px;
      border: none;
      display: block;
    }

    .footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Sales Performance Dashboard</h1>
    <span id="refreshTime">Last Refreshed: --</span>
  </div>

  <div class="container">
    <div class="iframe-wrapper">

      <!-- PASTE YOUR POWER BI IFRAME LINK HERE -->
      <iframe src="YOUR_POWER_BI_LINK_HERE" allowfullscreen></iframe>

    </div>
  </div>

  <div class="footer">
    Powered by Power BI Report Server &bull; Internal Use Only
  </div>

  <script>
    function updateTime() {
      var now = new Date();
      document.getElementById('refreshTime').textContent =
        'Last Refreshed: ' + now.toLocaleTimeString();
    }
    updateTime();
    setInterval(updateTime, 60000);
  </script>

</body>
</html>
